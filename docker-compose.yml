# docker-compose.yml - Konfiguracja Docker dla projektu PHP

services:
  # Serwer PHP
  php:
    image: php:8.2-apache
    container_name: adwokat-php
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html
      - ./config:/app/config
      - ./includes:/app/includes
      - ./views:/app/views
      - ./src:/app/src
    environment:
      - PHP_DATE_TIMEZONE=Europe/Warsaw
      - MYSQL_HOST=mysql
      - MYSQL_USER=adwokat_user
      - MYSQL_PASSWORD=secure_password_123
      - MYSQL_DATABASE=adwokat_db
    depends_on:
      - mysql
    networks:
      - adwokat-network
    restart: unless-stopped

  # Baza danych MySQL
  mysql:
    image: mysql:8.0
    container_name: adwokat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_USER: adwokat_user
      MYSQL_PASSWORD: secure_password_123
      MYSQL_DATABASE: adwokat_db
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - adwokat-network
    restart: unless-stopped

  # PhpMyAdmin (zarządzanie bazą danych przez GUI)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: adwokat-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: adwokat_user
      PMA_PASSWORD: secure_password_123
      PMA_DATABASE: adwokat_db
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - adwokat-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  adwokat-network:
    driver: bridge